version: '3.9'
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
  backend:
    build: ./backend
    env_file: .env.example
    ports:
      - '4000:4000'
    depends_on:
      - redis
      - minio
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - backend
  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
volumes:
  minio-data:
